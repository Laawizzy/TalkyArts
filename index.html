<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TalkyArt</title>
<style>
body{font-family:Arial;text-align:center;background:#f2f2f2;padding:20px;margin:0;}
h1{margin-bottom:5px;}
#designer{font-size:16px;color:#555;margin-bottom:20px;}
img{width:80vw;max-width:600px;border-radius:10px;margin:20px 0;}
button,input{padding:10px 20px;font-size:18px;margin:10px;border-radius:8px;border:1px solid #ccc;background:white;}
button:hover,input:hover{background:#f5f5f5;}
#timer{font-size:30px;margin-top:10px;}
#speechText{background:white;max-width:600px;margin:auto;margin-top:20px;padding:15px;border-radius:10px;font-size:18px;min-height:60px;}
</style>
</head>
<body>

<h1>TalkyArt</h1>
<p id="designer">Designed by: Eray Artışık</p>

<button onclick="newPhoto()">New Photo</button>
<input type="number" id="userTime" placeholder="Timer in seconds">
<button onclick="startSpeaking()">Start Speaking</button>
<button onclick="stopSpeaking()">Stop</button>

<img id="photo">
<h2 id="timer">Please specify the timer</h2>

<div id="speechText">Your speech will appear here...</div>

<script>

let mediaRecorder
let audioChunks=[]
let timer
let time=0

function newPhoto(){
 const url=`https://picsum.photos/600/400?random=${Math.random()}`
 document.getElementById("photo").src=url
 document.getElementById("speechText").innerText=""
}

function startTimer(duration){
 clearInterval(timer)
 time=duration
 document.getElementById("timer").innerText=time

 timer=setInterval(()=>{
  time--
  document.getElementById("timer").innerText=time
  if(time<=0) stopSpeaking()
 },1000)
}

async function startSpeaking(){

 const dur=parseInt(document.getElementById("userTime").value)

 if(!dur){
  document.getElementById("timer").innerText="Please specify the timer"
  return
 }

 const stream=await navigator.mediaDevices.getUserMedia({
  audio:{
   echoCancellation:true,
   noiseSuppression:true,
   sampleRate:44100
  }
 })

 audioChunks=[]

 const mimeType = MediaRecorder.isTypeSupported("audio/webm")
 ? "audio/webm"
 : "audio/mp4"

 mediaRecorder=new MediaRecorder(stream,{
  mimeType,
  audioBitsPerSecond:128000
 })

 mediaRecorder.ondataavailable=e=>{
  if(e.data.size>0) audioChunks.push(e.data)
 }

 mediaRecorder.onstop=async()=>{

  const blob=new Blob(audioChunks,{type:mimeType})

  const formData=new FormData()
  formData.append("audio",blob,"speech.webm")

  const res=await fetch("/api/transcribe",{
   method:"POST",
   body:formData
  })

  const data=await res.json()

  if(data.text){
   document.getElementById("speechText").innerText=data.text
  }else{
   document.getElementById("speechText").innerText="Speech not detected"
  }

 }

 mediaRecorder.start()
 startTimer(dur)

}

function stopSpeaking(){
 if(mediaRecorder && mediaRecorder.state==="recording"){
  mediaRecorder.stop()
  clearInterval(timer)
 }
}

newPhoto()

</script>

</body>
</html>
